<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col relative overflow-hidden">
<!-- Subtle Grain Texture Layer -->
<div class="absolute inset-0 grain-overlay opacity-40 z-0"></div>
<!-- Top Navigation Anchor (Shared Component Mapping) -->
<header class="flex justify-between items-center px-6 py-4 w-full top-0 z-10">
<button class="text-[#25686a] hover:bg-[#f5f3f0] transition-colors duration-300 p-2 rounded-full active:scale-95">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#25686a]">help_outline</span>
</div>
</header>
<!-- Main Pin Entry Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 z-10 max-w-[1440px] mx-auto w-full">
<!-- Identity Section -->
<div class="flex flex-col items-center mb-12 text-center">
<!-- Watercolor-style Icon Container -->
<div class="w-32 h-32 mb-6 relative flex items-center justify-center">
<div class="absolute inset-0 bg-primary/10 rounded-full blur-3xl animate-pulse"></div>
<div class="relative bg-surface-container-low p-8 rounded-full shadow-sm">
<span class="material-symbols-outlined text-6xl text-primary" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<h1 class="font-headline italic text-4xl tracking-tight text-primary mb-2">Parent Area</h1>
<p class="font-body text-on-surface-variant text-lg">Enter your 4-digit PIN</p>
</div>
<!-- PIN Visualization -->
<div class="flex gap-6 mb-16">
<div class="w-5 h-5 rounded-full border-2 border-primary-container bg-surface-container-highest"></div>
<div class="w-5 h-5 rounded-full border-2 border-primary-container bg-surface-container-highest"></div>
<div class="w-5 h-5 rounded-full border-2 border-primary-container bg-surface-container-highest"></div>
<div class="w-5 h-5 rounded-full border-2 border-primary-container bg-surface-container-highest"></div>
</div>
<!-- Number Pad (3x4 Grid) -->
<div class="grid grid-cols-3 gap-y-6 gap-x-12 mb-12">
<!-- Row 1 -->
<button class="w-20 h-20 rounded-full bg-surface-container-low flex items-center justify-center text-2xl font-semibold text-on-surface hover:bg-secondary-container transition-all duration-300 active:scale-90">1</button>
<button class="w-20 h-20 rounded-full bg-surface-container-low flex items-center justify-center text-2xl font-semibold text-on-surface hover:bg-secondary-container transition-all duration-300 active:scale-90">2</button>
<button class="w-20 h-20 rounded-full bg-surface-container-low flex items-center justify-center text-2xl font-semibold text-on-surface hover:bg-secondary-container transition-all duration-300 active:scale-90">3</button>
<!-- Row 2 -->
<button class="w-20 h-20 rounded-full bg-surface-container-low flex items-center justify-center text-2xl font-semibold text-on-surface hover:bg-secondary-container transition-all duration-300 active:scale-90">4</button>
<button class="w-20 h-20 rounded-full bg-surface-container-low flex items-center justify-center text-2xl font-semibold text-on-surface hover:bg-secondary-container transition-all duration-300 active:scale-90">5</button>
<button class="w-20 h-20 rounded-full bg-surface-container-low flex items-center justify-center text-2xl font-semibold text-on-surface hover:bg-secondary-container transition-all duration-300 active:scale-90">6</button>
<!-- Row 3 -->
<button class="w-20 h-20 rounded-full bg-surface-container-low flex items-center justify-center text-2xl font-semibold text-on-surface hover:bg-secondary-container transition-all duration-300 active:scale-90">7</button>
<button class="w-20 h-20 rounded-full bg-surface-container-low flex items-center justify-center text-2xl font-semibold text-on-surface hover:bg-secondary-container transition-all duration-300 active:scale-90">8</button>
<button class="w-20 h-20 rounded-full bg-surface-container-low flex items-center justify-center text-2xl font-semibold text-on-surface hover:bg-secondary-container transition-all duration-300 active:scale-90">9</button>
<!-- Row 4 -->
<div class="w-20 h-20 flex items-center justify-center"></div>
<button class="w-20 h-20 rounded-full bg-surface-container-low flex items-center justify-center text-2xl font-semibold text-on-surface hover:bg-secondary-container transition-all duration-300 active:scale-90">0</button>
<button class="w-20 h-20 rounded-full flex items-center justify-center text-primary-container hover:bg-surface-container-high transition-all duration-300 active:scale-90">
<span class="material-symbols-outlined text-3xl">backspace</span>
</button>
</div>
<!-- Footer Actions -->
<div class="flex flex-col items-center gap-8">
<a class="text-primary font-medium hover:underline decoration-primary-container underline-offset-4 tracking-wide text-sm" href="#">Forgot PIN?</a>
<div class="bg-surface-container-low/50 backdrop-blur px-6 py-3 rounded-full">
<p class="text-on-surface-variant text-xs flex items-center gap-2">
<span class="material-symbols-outlined text-sm">security</span>

                </p>
