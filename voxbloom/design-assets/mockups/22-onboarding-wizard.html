<div class="flex gap-4">

</div>
</div>

</div>
</div>
</div>

<div class="text-center space-y-6 max-w-md">
<h2 class="font-headline italic text-5xl md:text-6xl text-primary tracking-tight">
                Welcome to BoloBridge
            </h2>
<p class="text-on-surface-variant text-lg leading-relaxed font-body">
                Let's set up your child's speech journey with calm, intentional steps designed for growth.
            </p>
</div>
<!-- Progress Indicator -->
<div class="flex items-center gap-3 mt-12 mb-10">
<div class="w-2.5 h-2.5 rounded-full bg-sage-green"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-variant"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-variant"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-variant"></div>
</div>

<button class="w-full py-5 rounded-full watercolor-gradient text-on-primary font-semibold text-lg hover:opacity-90 active:scale-95 transition-all shadow-lg shadow-primary/10">
                Get Started
            </button>
<p class="text-center text-sm text-outline font-medium tracking-tight">
                Step 1 of 4: Setup Profile

<!-- Suppressed BottomNavBar for focused Onboarding context per rules -->
