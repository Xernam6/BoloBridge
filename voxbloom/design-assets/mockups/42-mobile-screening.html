<style>

<body class="bg-surface font-body text-on-surface min-h-screen max-w-[375px] mx-auto overflow-x-hidden relative">
<div class="film-grain"></div>
<!-- Top Navigation Shell -->
<header class="fixed top-0 w-full z-50 bg-[#fbf9f6] dark:bg-stone-900 flex items-center justify-between px-6 py-4 w-full max-w-[375px] mx-auto">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#7A9E7E]" data-icon="notes">notes</span>
</div>
<h1 class="font-['Newsreader'] italic text-[#25686a] dark:text-[#61a0a2] text-2xl tracking-tight">BoloBridge</h1>
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Avatar of a small child smiling" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDt8DNXKsic6nZ1Vl47FcrL7HUgYaMrQxfL5aIoSdIR0QrcszWH-sXqb63llL5xD4Gh_V1fOnt6KRl7jMIjFL6NvrT53D9hMMHVQkgZs6QSZ4kWaM7SmEr3youjNdGjVU4OdFdBmKzXYWMIokE7gVYADiGQBuWYao75i6VyS3NPQcOtxAwrwNDmedM-8_fEMylRdsb85gX46axLUyGwyhfD7nFaOqzYJnu4nBdQiawBF_y5CGj5JTK_CL9IwQ-F-qyHg33KBMc_vFAn"/>
</div>
<div class="bg-[#f5f3f0] dark:bg-stone-800/50 h-px w-full absolute bottom-0 left-0"></div>
</header>
<main class="pt-24 pb-32 px-6">
<!-- Progress Header -->
<section class="mb-8">
<h2 class="font-headline italic text-3xl text-primary mb-2">Early Sounds</h2>
<div class="flex justify-between items-end mb-2">
<span class="text-xs font-medium text-on-surface-variant tracking-tight">Sound 3 of 8 — 37%</span>
</div>
<div class="h-2 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full watercolor-primary w-[37%] rounded-full"></div>
</div>
</section>
<!-- Main Phoneme Card -->
<section class="relative mb-12">
<div class="bg-surface-container-lowest rounded-xl p-8 flex flex-col items-center text-center shadow-ambient border border-white/50">
<div class="text-7xl mb-6">🐻</div>
<div class="flex items-center gap-3 mb-2">
<h3 class="font-headline italic text-4xl text-on-surface">Bear</h3>
<span class="bg-tertiary-fixed text-on-tertiary-fixed-variant px-3 py-0.5 rounded-full text-sm font-semibold">/b/</span>
</div>
<p class="font-headline italic text-xl text-on-surface-variant">“The bear likes honey”</p>
</div>
<!-- Result Overlay (Conditional Mock) -->
<div class="absolute inset-0 bg-surface/90 backdrop-blur-sm rounded-xl flex flex-col items-center justify-center p-6 text-center z-10">
<div class="w-16 h-16 bg-[#7A9E7E]/10 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-[#7A9E7E] text-4xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h4 class="text-[#7A9E7E] font-headline italic text-3xl mb-1">Great! 85%</h4>
<p class="text-on-surface-variant text-sm mb-6">Clear pronunciation detected.</p>
<button class="w-full watercolor-primary text-white font-medium py-4 rounded-full mb-3 flex items-center justify-center gap-2 active:scale-95 transition-transform">
                    Next Sound
                    <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="text-tertiary font-medium text-sm hover:opacity-70 transition-opacity">Skip for now</button>
</div>
</section>
<!-- Recording Interface -->
<section class="flex flex-col items-center">
<div class="relative mb-4">
<!-- Pulse Rings -->
<div class="absolute inset-0 bg-[#7A9E7E] rounded-full opacity-20 scale-125"></div>
<div class="absolute inset-0 bg-[#7A9E7E] rounded-full opacity-10 scale-150"></div>
<button class="relative w-[72px] h-[72px] bg-[#7A9E7E] text-white rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined text-3xl" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<p class="text-on-surface-variant font-medium text-sm tracking-tight">Tap to record</p>
</section>
</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2 max-w-[375px] mx-auto bg-[#fbf9f6]/80 dark:bg-stone-900/80 backdrop-blur-md rounded-t-[3rem] z-50 shadow-[0_-20px_40px_rgba(66,72,66,0.06)]">

<span class="material-symbols-outlined text-[24px]" data-icon="menu_book">menu_book</span>
<span class="font-['Inter'] font-medium text-[10px] tracking-tight mt-1">Lessons</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-4 py-2 hover:text-[#25686a] dark:hover:text-[#61a0a2] active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[24px]" data-icon="auto_stories">auto_stories</span>
<span class="font-['Inter'] font-medium text-[10px] tracking-tight mt-1">Library</span>

<div class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 px-4 py-2 hover:text-[#25686a] dark:hover:text-[#61a0a2] active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[24px]" data-icon="settings">settings</span>
<span class="font-['Inter'] font-medium text-[10px] tracking-tight mt-1">Settings</span>
</div>

<div class="h-1 flex-1 rounded-full bg-surface-variant"></div>
<div class="h-1 flex-1 rounded-full bg-surface-variant"></div>
</div>
</div>
