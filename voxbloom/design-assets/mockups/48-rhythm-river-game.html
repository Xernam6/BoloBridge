<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rhythm River — BoloBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#FAF8F5',
            sage: '#5F9EA0',
            'sage-light': '#7BB8BA',
            'sage-dark': '#4D8587',
            camel: '#C2956B',
            'camel-light': '#D4AD88',
            'camel-dark': '#A87D55',
            lavender: '#8B7EC8',
            'lavender-light': '#A99DDB',
            navy: '#2D3142',
            card: '#F5F1EB',
            'card-dark': '#EBE5DB',
          },
          fontFamily: {
            lora: ['Lora', 'serif'],
            inter: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            'card': '24px',
            'btn': '12px',
          },
          boxShadow: {
            'card': '0 8px 32px rgba(0,0,0,0.06)',
            'card-hover': '0 12px 40px rgba(0,0,0,0.09)',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #FAF8F5; }

    /* Film grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* River flow animation */
    @keyframes riverFlow {
      0% { transform: translateX(0); }
      100% { transform: translateX(-120px); }
    }
    .river-flow {
      animation: riverFlow 4s linear infinite;
    }

    /* Gentle boat bobbing */
    @keyframes boatBob {
      0%, 100% { transform: translate(0, 0) rotate(-2deg); }
      33% { transform: translate(2px, -4px) rotate(0deg); }
      66% { transform: translate(-1px, -2px) rotate(-3deg); }
    }
    .boat-bob {
      animation: boatBob 3.5s ease-in-out infinite;
    }

    /* Timing line sweep */
    @keyframes timingSweep {
      0% { left: 0%; }
      100% { left: 100%; }
    }
    .timing-line {
      animation: timingSweep 3s ease-in-out infinite;
    }

    /* Waveform bar animation */
    @keyframes waveBar1 { 0%, 100% { height: 8px; } 50% { height: 20px; } }
    @keyframes waveBar2 { 0%, 100% { height: 14px; } 50% { height: 28px; } }
    @keyframes waveBar3 { 0%, 100% { height: 6px; } 50% { height: 24px; } }
    @keyframes waveBar4 { 0%, 100% { height: 10px; } 50% { height: 18px; } }
    @keyframes waveBar5 { 0%, 100% { height: 12px; } 50% { height: 22px; } }

    .wave-bar-1 { animation: waveBar1 1.2s ease-in-out infinite; }
    .wave-bar-2 { animation: waveBar2 1.0s ease-in-out infinite 0.1s; }
    .wave-bar-3 { animation: waveBar3 0.9s ease-in-out infinite 0.2s; }
    .wave-bar-4 { animation: waveBar4 1.1s ease-in-out infinite 0.15s; }
    .wave-bar-5 { animation: waveBar5 1.3s ease-in-out infinite 0.05s; }

    /* Water ripple pattern */
    @keyframes ripple {
      0% { opacity: 0.15; transform: scaleX(1); }
      50% { opacity: 0.25; transform: scaleX(1.05); }
      100% { opacity: 0.15; transform: scaleX(1); }
    }
    .water-ripple {
      animation: ripple 3.5s ease-in-out infinite;
    }

    /* Gentle pulse for active beat */
    @keyframes beatPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .beat-pulse {
      animation: beatPulse 1.5s ease-in-out infinite;
    }

    /* River progress fill */
    @keyframes progressShimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
  </style>
</head>
<body class="min-h-screen bg-cream text-navy overflow-x-hidden">

  <div class="max-w-lg mx-auto px-5 py-6 flex flex-col gap-5 min-h-screen">

    <!-- ========== GAME HEADER ========== -->
    <header class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button class="w-10 h-10 flex items-center justify-center rounded-btn bg-card text-navy shadow-card hover:bg-card-dark transition-colors">
          <span class="material-symbols-outlined text-xl">arrow_back</span>
        </button>
        <div>
          <h1 class="font-lora italic text-xl font-semibold text-navy leading-tight">Rhythm River</h1>
          <span class="text-xs font-medium text-sage-dark tracking-wide uppercase">Level 5</span>
        </div>
      </div>
      <div class="flex items-center gap-1.5 bg-card px-4 py-2 rounded-full shadow-card">
        <span class="text-camel text-base">&#9733;</span>
        <span class="font-semibold text-sm text-navy">380</span>
      </div>
    </header>

    <!-- ========== RIVER SCENE ========== -->
    <div class="relative bg-card rounded-card shadow-card overflow-hidden" style="height: 220px;">
      <!-- Sky -->
      <div class="absolute inset-0" style="background: linear-gradient(180deg, #FAF8F5 0%, #F0EDE6 40%, #E8E0D4 100%);"></div>

      <!-- Distant hills -->
      <svg class="absolute bottom-0 left-0 w-full" viewBox="0 0 500 220" preserveAspectRatio="none" style="height: 220px;">
        <!-- Far hills -->
        <ellipse cx="100" cy="140" rx="180" ry="50" fill="#C2956B" opacity="0.15"/>
        <ellipse cx="380" cy="130" rx="160" ry="55" fill="#C2956B" opacity="0.12"/>

        <!-- Riverbanks -->
        <path d="M0,130 Q60,115 130,125 Q200,135 270,120 Q340,105 420,118 Q470,125 500,115 L500,220 L0,220 Z" fill="#C2956B" opacity="0.35"/>
        <path d="M0,170 Q80,155 150,165 Q230,175 310,160 Q380,148 440,158 Q480,165 500,155 L500,220 L0,220 Z" fill="#C2956B" opacity="0.45"/>

        <!-- River water -->
        <path d="M0,145 Q70,133 140,142 Q215,152 290,138 Q360,126 430,136 Q475,142 500,134 L500,175 Q460,168 400,162 Q330,155 260,168 Q190,178 120,170 Q60,163 0,172 Z" fill="#5F9EA0" opacity="0.55"/>

        <!-- Water surface highlight -->
        <path class="water-ripple" d="M0,150 Q80,140 160,148 Q240,156 320,143 Q400,132 500,140 L500,155 Q400,147 320,158 Q240,168 160,160 Q80,152 0,162 Z" fill="#7BB8BA" opacity="0.3"/>

        <!-- Water ripple lines -->
        <line x1="60" y1="152" x2="110" y2="149" stroke="#7BB8BA" stroke-width="1" opacity="0.3" class="water-ripple"/>
        <line x1="180" y1="148" x2="230" y2="153" stroke="#7BB8BA" stroke-width="1" opacity="0.25" class="water-ripple" style="animation-delay: 0.5s;"/>
        <line x1="300" y1="145" x2="350" y2="140" stroke="#7BB8BA" stroke-width="1" opacity="0.3" class="water-ripple" style="animation-delay: 1s;"/>
        <line x1="400" y1="142" x2="445" y2="146" stroke="#7BB8BA" stroke-width="1" opacity="0.25" class="water-ripple" style="animation-delay: 1.5s;"/>

        <!-- Lower riverbank -->
        <path d="M0,175 Q90,168 170,178 Q250,186 340,172 Q410,162 500,172 L500,220 L0,220 Z" fill="#C2956B" opacity="0.55"/>

        <!-- Grass tufts on banks -->
        <ellipse cx="40" cy="133" rx="12" ry="5" fill="#5F9EA0" opacity="0.2"/>
        <ellipse cx="250" cy="122" rx="10" ry="4" fill="#5F9EA0" opacity="0.18"/>
        <ellipse cx="460" cy="118" rx="14" ry="5" fill="#5F9EA0" opacity="0.2"/>
        <ellipse cx="80" cy="180" rx="11" ry="4" fill="#5F9EA0" opacity="0.18"/>
        <ellipse cx="350" cy="173" rx="13" ry="5" fill="#5F9EA0" opacity="0.2"/>
      </svg>

      <!-- Leaf boat character -->
      <div class="boat-bob absolute" style="left: 38%; bottom: 52px; z-index: 10;">
        <svg width="48" height="36" viewBox="0 0 48 36">
          <!-- Leaf body -->
          <path d="M4,22 Q10,8 24,6 Q38,8 44,22 Q34,26 24,28 Q14,26 4,22 Z" fill="#5F9EA0" stroke="#4D8587" stroke-width="1.5"/>
          <!-- Leaf vein -->
          <line x1="24" y1="8" x2="24" y2="26" stroke="#4D8587" stroke-width="1" opacity="0.5"/>
          <line x1="24" y1="14" x2="16" y2="20" stroke="#4D8587" stroke-width="0.8" opacity="0.35"/>
          <line x1="24" y1="14" x2="32" y2="20" stroke="#4D8587" stroke-width="0.8" opacity="0.35"/>
          <!-- Small character sitting on leaf -->
          <circle cx="24" cy="10" r="4" fill="#FAF8F5" stroke="#2D3142" stroke-width="1"/>
          <circle cx="22.5" cy="9" r="0.8" fill="#2D3142"/>
          <circle cx="25.5" cy="9" r="0.8" fill="#2D3142"/>
          <path d="M22.5,11.5 Q24,13 25.5,11.5" stroke="#2D3142" stroke-width="0.8" fill="none" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- Mile markers along river -->
      <div class="absolute flex items-end gap-0" style="bottom: 80px; left: 12%; z-index: 5;">
        <div class="flex flex-col items-center">
          <div class="w-1 h-4 bg-camel rounded-full opacity-50"></div>
          <div class="w-3 h-3 rounded-full bg-camel opacity-40 mt-0.5"></div>
        </div>
      </div>
      <div class="absolute flex items-end gap-0" style="bottom: 72px; left: 62%; z-index: 5;">
        <div class="flex flex-col items-center">
          <div class="w-1 h-4 bg-camel rounded-full opacity-50"></div>
          <div class="w-3 h-3 rounded-full bg-camel opacity-40 mt-0.5"></div>
        </div>
      </div>
      <div class="absolute flex items-end gap-0" style="bottom: 76px; left: 85%; z-index: 5;">
        <div class="flex flex-col items-center">
          <div class="w-1 h-4 bg-camel rounded-full opacity-30"></div>
          <div class="w-3 h-3 rounded-full bg-camel opacity-25 mt-0.5"></div>
        </div>
      </div>

      <!-- Scene label -->
      <div class="absolute top-3 right-3 bg-white/60 backdrop-blur-sm px-3 py-1 rounded-full">
        <span class="text-xs font-medium text-sage-dark">Mile 3</span>
      </div>
    </div>

    <!-- ========== PHRASE CARD ========== -->
    <div class="bg-card rounded-card shadow-card px-6 py-5">
      <div class="flex items-center gap-2 mb-3">
        <span class="material-symbols-outlined text-lg text-camel">record_voice_over</span>
        <span class="text-xs font-semibold text-camel uppercase tracking-wider">Say this phrase</span>
      </div>
      <p class="font-lora italic text-2xl text-navy leading-snug">&ldquo;The cat sat on the mat&rdquo;</p>
    </div>

    <!-- ========== RHYTHM PATTERN & TIMING ========== -->
    <div class="bg-card rounded-card shadow-card px-6 py-5">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-lg text-lavender">music_note</span>
          <span class="text-xs font-semibold text-lavender uppercase tracking-wider">Rhythm Pattern</span>
        </div>
        <span class="text-xs text-navy/50 font-medium">4 beats</span>
      </div>

      <!-- Beat indicators -->
      <div class="relative px-2">
        <div class="flex items-center justify-between mb-2">
          <div class="flex flex-col items-center gap-1.5">
            <div class="w-10 h-10 rounded-full bg-sage flex items-center justify-center beat-pulse">
              <div class="w-4 h-4 rounded-full bg-white"></div>
            </div>
            <span class="text-[10px] font-semibold text-sage uppercase">The</span>
          </div>
          <div class="flex flex-col items-center gap-1.5">
            <div class="w-10 h-10 rounded-full border-2 border-sage/30 flex items-center justify-center">
              <div class="w-4 h-4 rounded-full border-2 border-sage/30"></div>
            </div>
            <span class="text-[10px] font-medium text-navy/40 uppercase">cat</span>
          </div>
          <div class="flex flex-col items-center gap-1.5">
            <div class="w-10 h-10 rounded-full bg-sage flex items-center justify-center">
              <div class="w-4 h-4 rounded-full bg-white"></div>
            </div>
            <span class="text-[10px] font-semibold text-sage uppercase">sat</span>
          </div>
          <div class="flex flex-col items-center gap-1.5">
            <div class="w-10 h-10 rounded-full bg-sage flex items-center justify-center">
              <div class="w-4 h-4 rounded-full bg-white"></div>
            </div>
            <span class="text-[10px] font-semibold text-sage uppercase">mat</span>
          </div>
        </div>

        <!-- Timing indicator line -->
        <div class="relative h-2 bg-card-dark rounded-full mt-3 overflow-hidden">
          <div class="timing-line absolute top-0 w-6 h-2 bg-lavender rounded-full" style="box-shadow: 0 0 8px rgba(139,126,200,0.3);"></div>
        </div>
        <div class="flex justify-between mt-1">
          <span class="text-[9px] text-navy/30 font-medium">START</span>
          <span class="text-[9px] text-navy/30 font-medium">END</span>
        </div>
      </div>
    </div>

    <!-- ========== MIC INPUT & ACCURACY (side by side) ========== -->
    <div class="grid grid-cols-2 gap-4">
      <!-- Microphone input -->
      <div class="bg-card rounded-card shadow-card px-5 py-5 flex flex-col items-center gap-4">
        <span class="text-xs font-semibold text-navy/50 uppercase tracking-wider">Microphone</span>

        <!-- Mic button -->
        <button class="relative w-16 h-16 rounded-full bg-sage text-white flex items-center justify-center shadow-card hover:bg-sage-dark transition-colors">
          <span class="material-symbols-outlined text-2xl">mic</span>
          <!-- Active ring -->
          <div class="absolute inset-0 rounded-full border-2 border-sage/30 beat-pulse"></div>
        </button>

        <!-- Waveform bars -->
        <div class="flex items-end gap-1 h-7">
          <div class="w-1 rounded-full bg-sage/60 wave-bar-1" style="height: 8px;"></div>
          <div class="w-1 rounded-full bg-sage/70 wave-bar-2" style="height: 14px;"></div>
          <div class="w-1 rounded-full bg-sage wave-bar-3" style="height: 6px;"></div>
          <div class="w-1 rounded-full bg-sage wave-bar-4" style="height: 10px;"></div>
          <div class="w-1 rounded-full bg-sage/80 wave-bar-5" style="height: 12px;"></div>
          <div class="w-1 rounded-full bg-sage/60 wave-bar-1" style="height: 8px; animation-delay: 0.3s;"></div>
          <div class="w-1 rounded-full bg-sage/70 wave-bar-3" style="height: 14px; animation-delay: 0.15s;"></div>
          <div class="w-1 rounded-full bg-sage wave-bar-2" style="height: 6px; animation-delay: 0.25s;"></div>
          <div class="w-1 rounded-full bg-sage/80 wave-bar-4" style="height: 10px; animation-delay: 0.35s;"></div>
        </div>

        <span class="text-[10px] text-navy/40 font-medium">Tap to speak</span>
      </div>

      <!-- Accuracy meter -->
      <div class="bg-card rounded-card shadow-card px-5 py-5 flex flex-col items-center gap-3">
        <span class="text-xs font-semibold text-navy/50 uppercase tracking-wider">Accuracy</span>

        <!-- Circular meter -->
        <div class="relative w-20 h-20">
          <svg viewBox="0 0 80 80" class="w-full h-full -rotate-90">
            <circle cx="40" cy="40" r="34" fill="none" stroke="#EBE5DB" stroke-width="6"/>
            <circle cx="40" cy="40" r="34" fill="none" stroke="#5F9EA0" stroke-width="6"
              stroke-dasharray="213.6" stroke-dashoffset="42.7" stroke-linecap="round"/>
          </svg>
          <div class="absolute inset-0 flex flex-col items-center justify-center">
            <span class="text-lg font-bold text-navy leading-none">80%</span>
          </div>
        </div>

        <div class="text-center">
          <span class="text-xs font-semibold text-sage">Great rhythm!</span>
        </div>

        <!-- Mini stats -->
        <div class="flex gap-3">
          <div class="text-center">
            <div class="text-xs font-bold text-navy">12</div>
            <div class="text-[9px] text-navy/40">Hits</div>
          </div>
          <div class="w-px bg-card-dark"></div>
          <div class="text-center">
            <div class="text-xs font-bold text-navy">3</div>
            <div class="text-[9px] text-navy/40">Missed</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ========== RIVER PROGRESS ========== -->
    <div class="bg-card rounded-card shadow-card px-6 py-5">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-lg text-camel">sailing</span>
          <span class="text-xs font-semibold text-camel uppercase tracking-wider">River Progress</span>
        </div>
        <span class="text-sm font-semibold text-navy">Mile 3 <span class="text-navy/40 font-normal">of 8</span></span>
      </div>

      <!-- River-themed progress bar -->
      <div class="relative">
        <div class="h-4 bg-card-dark rounded-full overflow-hidden">
          <div class="h-full rounded-full bg-sage relative" style="width: 37.5%;">
            <!-- Water texture in progress -->
            <div class="absolute inset-0 opacity-30">
              <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 200 16">
                <path d="M0,8 Q20,4 40,8 Q60,12 80,8 Q100,4 120,8 Q140,12 160,8 Q180,4 200,8" fill="none" stroke="white" stroke-width="1.5"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- Mile markers on progress bar -->
        <div class="flex justify-between mt-2 px-0.5">
          <div class="w-1.5 h-1.5 rounded-full bg-sage"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-sage"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-sage"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-card-dark"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-card-dark"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-card-dark"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-card-dark"></div>
          <div class="w-1.5 h-1.5 rounded-full bg-card-dark"></div>
        </div>
      </div>
    </div>

    <!-- ========== BOTTOM CONTROLS ========== -->
    <div class="flex items-center gap-3 mt-auto pb-2">
      <button class="flex-1 flex items-center justify-center gap-2 bg-card text-navy font-semibold text-sm py-3.5 rounded-btn shadow-card hover:bg-card-dark transition-colors">
        <span class="material-symbols-outlined text-lg text-lavender">lightbulb</span>
        Hint
      </button>
      <button class="flex-1 flex items-center justify-center gap-2 bg-sage text-white font-semibold text-sm py-3.5 rounded-btn shadow-card hover:bg-sage-dark transition-colors">
        <span class="material-symbols-outlined text-lg">replay</span>
        Replay
      </button>
      <button class="flex-1 flex items-center justify-center gap-2 bg-card text-navy font-semibold text-sm py-3.5 rounded-btn shadow-card hover:bg-card-dark transition-colors">
        <span class="material-symbols-outlined text-lg text-camel">skip_next</span>
        Skip
      </button>
    </div>

  </div>

</body>
</html>
