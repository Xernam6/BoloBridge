                </h1>

<div class="w-8 h-8 rounded-full bg-on-primary flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-xl font-bold">check</span>
</div>
</button>

<div class="bg-primary/5 border border-primary-container/20 rounded-lg p-6 flex gap-4 items-start animate-in fade-in slide-in-from-top-4">

<div>

                                </p>
</div>
