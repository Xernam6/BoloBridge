<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <radialGradient id="cel-bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#F5F1EB"/>
    </radialGradient>
    <linearGradient id="cel-star" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#C2956B"/>
      <stop offset="60%" stop-color="#D4A373"/>
      <stop offset="100%" stop-color="#8B7EC8" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="cel-glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cel-soft"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="600" height="600" fill="url(#cel-bg)"/>

  <!-- Background radial glow -->
  <circle cx="300" cy="280" r="160" fill="#C2956B" opacity="0.05" filter="url(#cel-soft)"/>
  <circle cx="300" cy="280" r="100" fill="#8B7EC8" opacity="0.04" filter="url(#cel-soft)"/>

  <!-- Trophy stand -->
  <rect x="270" y="380" width="60" height="12" rx="4" fill="#2D3142" opacity="0.15"/>
  <rect x="280" y="360" width="40" height="24" rx="3" fill="#2D3142" opacity="0.1"/>
  <rect x="260" y="390" width="80" height="8" rx="3" fill="#2D3142" opacity="0.08"/>

  <!-- Trophy cup body -->
  <path d="M240,280 L240,340 C240,365 265,380 300,380 C335,380 360,365 360,340 L360,280 Z" fill="url(#cel-star)" opacity="0.35" filter="url(#cel-glow)"/>
  <path d="M240,280 L240,340 C240,365 265,380 300,380 C335,380 360,365 360,340 L360,280" fill="none" stroke="#C2956B" stroke-width="1.5" opacity="0.5"/>

  <!-- Trophy handles -->
  <path d="M240,290 C220,290 210,310 210,325 C210,345 225,355 240,345" fill="none" stroke="#C2956B" stroke-width="1.5" opacity="0.35"/>
  <path d="M360,290 C380,290 390,310 390,325 C390,345 375,355 360,345" fill="none" stroke="#C2956B" stroke-width="1.5" opacity="0.35"/>

  <!-- Star shape on trophy -->
  <polygon points="300,220 312,256 350,256 320,278 330,314 300,294 270,314 280,278 250,256 288,256" fill="url(#cel-star)" opacity="0.5" filter="url(#cel-glow)"/>
  <polygon points="300,220 312,256 350,256 320,278 330,314 300,294 270,314 280,278 250,256 288,256" fill="none" stroke="#C2956B" stroke-width="1" opacity="0.4"/>

  <!-- Inner star highlight -->
  <polygon points="300,240 308,258 328,258 312,270 318,290 300,278 282,290 288,270 272,258 292,258" fill="#FAF8F5" opacity="0.2"/>

  <!-- Confetti pieces — carefully scattered -->
  <!-- Teal confetti -->
  <rect x="120" y="150" width="8" height="4" rx="2" fill="#5F9EA0" opacity="0.35" transform="rotate(25 124 152)"/>
  <rect x="90" y="280" width="6" height="3" rx="1.5" fill="#5F9EA0" opacity="0.25" transform="rotate(-15 93 281)"/>
  <rect x="460" y="170" width="7" height="3.5" rx="1.5" fill="#5F9EA0" opacity="0.3" transform="rotate(40 463 171)"/>
  <rect x="500" y="320" width="6" height="3" rx="1.5" fill="#5F9EA0" opacity="0.2" transform="rotate(-30 503 321)"/>

  <!-- Lavender confetti -->
  <rect x="180" y="120" width="7" height="3.5" rx="1.5" fill="#8B7EC8" opacity="0.3" transform="rotate(-20 183 121)"/>
  <rect x="150" y="340" width="5" height="2.5" rx="1.2" fill="#8B7EC8" opacity="0.2" transform="rotate(35 152 341)"/>
  <rect x="420" y="130" width="8" height="4" rx="2" fill="#8B7EC8" opacity="0.35" transform="rotate(15 424 132)"/>
  <rect x="480" y="260" width="6" height="3" rx="1.5" fill="#8B7EC8" opacity="0.2" transform="rotate(-45 483 261)"/>

  <!-- Camel confetti -->
  <rect x="200" y="180" width="6" height="3" rx="1.5" fill="#C2956B" opacity="0.3" transform="rotate(50 203 181)"/>
  <rect x="100" y="220" width="7" height="3.5" rx="1.5" fill="#C2956B" opacity="0.25" transform="rotate(-10 103 221)"/>
  <rect x="400" y="200" width="5" height="2.5" rx="1.2" fill="#C2956B" opacity="0.25" transform="rotate(30 402 201)"/>
  <rect x="520" y="200" width="7" height="3.5" rx="1.5" fill="#C2956B" opacity="0.2" transform="rotate(-35 523 201)"/>

  <!-- Rose confetti -->
  <rect x="250" y="100" width="6" height="3" rx="1.5" fill="#D16D6D" opacity="0.2" transform="rotate(10 253 101)"/>
  <rect x="350" y="110" width="5" height="2.5" rx="1.2" fill="#D16D6D" opacity="0.15" transform="rotate(-25 352 111)"/>

  <!-- Confetti circles (dots) -->
  <circle cx="140" cy="200" r="3" fill="#5F9EA0" opacity="0.2"/>
  <circle cx="470" cy="150" r="2.5" fill="#8B7EC8" opacity="0.18"/>
  <circle cx="380" cy="100" r="2" fill="#C2956B" opacity="0.15"/>
  <circle cx="220" cy="110" r="2" fill="#D16D6D" opacity="0.12"/>
  <circle cx="510" cy="240" r="2" fill="#5F9EA0" opacity="0.12"/>
  <circle cx="80" cy="300" r="2.5" fill="#8B7EC8" opacity="0.1"/>

  <!-- Sparkle bursts (4-point stars) -->
  <g transform="translate(160,160)" opacity="0.2">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#C2956B" stroke-width="1"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#C2956B" stroke-width="1"/>
    <line x1="-3" y1="-3" x2="3" y2="3" stroke="#C2956B" stroke-width="0.5"/>
    <line x1="3" y1="-3" x2="-3" y2="3" stroke="#C2956B" stroke-width="0.5"/>
  </g>
  <g transform="translate(450,220)" opacity="0.15">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#8B7EC8" stroke-width="1"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#8B7EC8" stroke-width="1"/>
    <line x1="-2.5" y1="-2.5" x2="2.5" y2="2.5" stroke="#8B7EC8" stroke-width="0.5"/>
    <line x1="2.5" y1="-2.5" x2="-2.5" y2="2.5" stroke="#8B7EC8" stroke-width="0.5"/>
  </g>
  <g transform="translate(340,150)" opacity="0.12">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#5F9EA0" stroke-width="0.8"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#5F9EA0" stroke-width="0.8"/>
  </g>
</svg>
