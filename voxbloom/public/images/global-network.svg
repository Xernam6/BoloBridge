<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="gn-bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#F5F1EB"/>
    </radialGradient>
    <filter id="gn-glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gn-soft"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>

  <rect width="800" height="800" fill="url(#gn-bg)"/>

  <!-- Continent dot clusters — stippled map effect -->
  <!-- North America -->
  <g fill="#2D3142" opacity="0.12">
    <circle cx="160" cy="230" r="2.5"/><circle cx="170" cy="240" r="2"/><circle cx="155" cy="250" r="2.2"/>
    <circle cx="175" cy="255" r="1.8"/><circle cx="165" cy="265" r="2.5"/><circle cx="180" cy="270" r="1.5"/>
    <circle cx="150" cy="275" r="2"/><circle cx="170" cy="280" r="2.2"/><circle cx="185" cy="285" r="1.8"/>
    <circle cx="175" cy="295" r="2"/><circle cx="165" cy="305" r="1.5"/><circle cx="155" cy="290" r="1.8"/>
    <circle cx="190" cy="300" r="1.2"/><circle cx="195" cy="270" r="1.5"/>
  </g>
  <!-- South America -->
  <g fill="#2D3142" opacity="0.1">
    <circle cx="220" cy="400" r="2.2"/><circle cx="230" cy="415" r="2"/><circle cx="225" cy="430" r="2.5"/>
    <circle cx="235" cy="445" r="1.8"/><circle cx="228" cy="460" r="2"/><circle cx="222" cy="475" r="1.5"/>
    <circle cx="230" cy="490" r="1.8"/><circle cx="225" cy="505" r="1.2"/><circle cx="220" cy="520" r="1"/>
    <circle cx="215" cy="535" r="0.8"/>
  </g>
  <!-- Europe -->
  <g fill="#2D3142" opacity="0.12">
    <circle cx="380" cy="230" r="2"/><circle cx="390" cy="220" r="1.8"/><circle cx="400" cy="235" r="2.2"/>
    <circle cx="395" cy="250" r="1.5"/><circle cx="410" cy="240" r="2"/><circle cx="385" cy="260" r="1.8"/>
    <circle cx="405" cy="265" r="1.2"/><circle cx="375" cy="245" r="1.5"/><circle cx="415" cy="255" r="1"/>
  </g>
  <!-- Africa -->
  <g fill="#2D3142" opacity="0.1">
    <circle cx="400" cy="340" r="2.5"/><circle cx="410" cy="355" r="2"/><circle cx="395" cy="370" r="2.2"/>
    <circle cx="405" cy="385" r="1.8"/><circle cx="415" cy="400" r="2"/><circle cx="400" cy="415" r="2.5"/>
    <circle cx="410" cy="430" r="1.5"/><circle cx="395" cy="445" r="1.8"/><circle cx="405" cy="460" r="1.2"/>
    <circle cx="410" cy="475" r="1"/><circle cx="420" cy="370" r="1.5"/>
    <circle cx="385" cy="390" r="1.2"/><circle cx="425" cy="415" r="1"/>
  </g>
  <!-- Asia -->
  <g fill="#2D3142" opacity="0.11">
    <circle cx="500" cy="240" r="2.2"/><circle cx="520" cy="250" r="2"/><circle cx="540" cy="240" r="2.5"/>
    <circle cx="560" cy="255" r="1.8"/><circle cx="580" cy="248" r="2"/><circle cx="600" cy="260" r="2.2"/>
    <circle cx="510" cy="270" r="1.5"/><circle cx="530" cy="275" r="2"/><circle cx="550" cy="268" r="1.8"/>
    <circle cx="570" cy="280" r="1.5"/><circle cx="590" cy="275" r="1.2"/><circle cx="610" cy="285" r="1"/>
    <circle cx="500" cy="290" r="1.8"/><circle cx="520" cy="295" r="1.5"/><circle cx="545" cy="290" r="1.2"/>
    <circle cx="620" cy="300" r="1.8"/><circle cx="635" cy="290" r="1.5"/><circle cx="640" cy="310" r="1.2"/>
    <circle cx="625" cy="320" r="1"/><circle cx="480" cy="260" r="1.5"/>
  </g>
  <!-- Australia -->
  <g fill="#2D3142" opacity="0.09">
    <circle cx="620" cy="460" r="2.2"/><circle cx="635" cy="470" r="2"/><circle cx="650" cy="465" r="1.8"/>
    <circle cx="625" cy="480" r="1.5"/><circle cx="640" cy="485" r="2"/><circle cx="655" cy="480" r="1.2"/>
    <circle cx="630" cy="495" r="1.5"/>
  </g>

  <!-- Connection arcs between nodes -->
  <!-- US to Europe -->
  <path d="M175,250 Q280,160 390,235" fill="none" stroke="#5F9EA0" stroke-width="1.2" opacity="0.2" filter="url(#gn-soft)"/>
  <!-- US to South America -->
  <path d="M175,295 Q195,350 225,400" fill="none" stroke="#5F9EA0" stroke-width="1" opacity="0.15"/>
  <!-- Europe to Asia -->
  <path d="M410,240 Q460,210 500,240" fill="none" stroke="#8B7EC8" stroke-width="1.2" opacity="0.2" filter="url(#gn-soft)"/>
  <!-- Europe to Africa -->
  <path d="M395,260 Q385,300 400,340" fill="none" stroke="#8B7EC8" stroke-width="1" opacity="0.15"/>
  <!-- Asia to Australia -->
  <path d="M620,310 Q630,380 625,460" fill="none" stroke="#C2956B" stroke-width="1" opacity="0.15"/>
  <!-- US to Asia (great circle) -->
  <path d="M185,240 Q400,100 540,240" fill="none" stroke="#5F9EA0" stroke-width="0.8" opacity="0.1" stroke-dasharray="4 6"/>
  <!-- South America to Africa -->
  <path d="M235,430 Q320,380 400,370" fill="none" stroke="#C2956B" stroke-width="0.8" opacity="0.1" stroke-dasharray="4 6"/>

  <!-- City node highlights — the 6 supported language regions -->
  <!-- US (English) -->
  <circle cx="170" cy="270" r="5" fill="#5F9EA0" opacity="0.2" filter="url(#gn-glow)"/>
  <circle cx="170" cy="270" r="2" fill="#5F9EA0" opacity="0.5"/>
  <!-- India (Hindi) -->
  <circle cx="540" cy="310" r="5" fill="#C2956B" opacity="0.2" filter="url(#gn-glow)"/>
  <circle cx="540" cy="310" r="2" fill="#C2956B" opacity="0.5"/>
  <!-- South Africa (Afrikaans) -->
  <circle cx="415" cy="480" r="5" fill="#8B7EC8" opacity="0.2" filter="url(#gn-glow)"/>
  <circle cx="415" cy="480" r="2" fill="#8B7EC8" opacity="0.5"/>
  <!-- Bangladesh (Bengali) -->
  <circle cx="570" cy="295" r="5" fill="#5F9EA0" opacity="0.18" filter="url(#gn-glow)"/>
  <circle cx="570" cy="295" r="2" fill="#5F9EA0" opacity="0.45"/>
  <!-- Philippines (Tagalog) -->
  <circle cx="640" cy="330" r="5" fill="#C2956B" opacity="0.18" filter="url(#gn-glow)"/>
  <circle cx="640" cy="330" r="2" fill="#C2956B" opacity="0.45"/>
  <!-- Mexico/Spain (Spanish) -->
  <circle cx="155" cy="310" r="5" fill="#8B7EC8" opacity="0.18" filter="url(#gn-glow)"/>
  <circle cx="155" cy="310" r="2" fill="#8B7EC8" opacity="0.45"/>

  <!-- Language labels (very subtle) -->
  <text x="170" y="258" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#2D3142" opacity="0.2">EN</text>
  <text x="540" y="298" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#2D3142" opacity="0.18">HI</text>
  <text x="415" y="468" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#2D3142" opacity="0.18">AF</text>
  <text x="570" y="283" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#2D3142" opacity="0.16">BN</text>
  <text x="640" y="318" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#2D3142" opacity="0.16">TL</text>
  <text x="155" y="298" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" fill="#2D3142" opacity="0.16">ES</text>
</svg>
