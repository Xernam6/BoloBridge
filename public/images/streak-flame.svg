<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="flameMain" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#C2956B"/>
      <stop offset="40%" stop-color="#D4A373"/>
      <stop offset="75%" stop-color="#D16D6D"/>
      <stop offset="100%" stop-color="#D16D6D" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="flameInner" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="50%" stop-color="#D4A373" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C2956B" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="flameGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <ellipse cx="128" cy="160" rx="50" ry="20" fill="#C2956B" opacity="0.08" filter="url(#flameGlow)"/>
  <!-- Main flame body -->
  <path d="M128,32 C128,32 80,88 80,140 C80,166.5 101.5,188 128,188 C154.5,188 176,166.5 176,140 C176,96 128,32 128,32 Z" fill="url(#flameMain)" filter="url(#flameGlow)"/>
  <!-- Inner flame highlight -->
  <path d="M128,100 C128,100 104,130 104,152 C104,165.3 114.7,176 128,176 C141.3,176 152,165.3 152,152 C152,134 128,100 128,100 Z" fill="url(#flameInner)" opacity="0.7"/>
  <!-- Tiny spark -->
  <circle cx="128" cy="140" r="6" fill="#FAF8F5" opacity="0.5"/>
</svg>
