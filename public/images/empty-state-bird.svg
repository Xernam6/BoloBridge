<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="es-bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#F5F1EB"/>
    </radialGradient>
    <filter id="es-glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="es-soft"><feGaussianBlur stdDeviation="1"/></filter>
  </defs>

  <rect width="400" height="400" fill="url(#es-bg)"/>

  <!-- Branch -->
  <path d="M80,260 C120,255 180,250 250,245 C290,242 320,248 340,255" fill="none" stroke="#C2956B" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Branch texture lines -->
  <path d="M120,256 C130,254 140,255 150,253" fill="none" stroke="#C2956B" stroke-width="0.8" opacity="0.2"/>
  <path d="M210,247 C225,245 240,246 255,244" fill="none" stroke="#C2956B" stroke-width="0.8" opacity="0.2"/>

  <!-- Small leaves on branch -->
  <path d="M100,252 C105,242 115,240 118,248 C121,256 110,258 105,254 Z" fill="#5F9EA0" opacity="0.25"/>
  <path d="M300,248 C305,238 315,236 318,244 C321,252 310,254 305,250 Z" fill="#5F9EA0" opacity="0.2"/>
  <path d="M330,252 C332,244 340,242 342,248 C344,254 336,256 333,253 Z" fill="#5F9EA0" opacity="0.15"/>
  <!-- Left hanging leaf -->
  <path d="M85,262 C80,272 82,282 90,278 C98,274 92,264 87,264 Z" fill="#5F9EA0" opacity="0.18"/>

  <!-- Bird body — sleeping parrot-like, facing right -->
  <!-- Tail feathers -->
  <path d="M160,250 C140,270 130,300 135,320 C138,325 145,322 148,310 C152,298 155,280 160,260" fill="#8B7EC8" opacity="0.25" filter="url(#es-soft)"/>
  <path d="M165,252 C150,268 142,295 147,312 C150,316 155,314 157,305 C160,290 162,272 165,258" fill="#5F9EA0" opacity="0.2" filter="url(#es-soft)"/>

  <!-- Body -->
  <ellipse cx="200" cy="220" rx="38" ry="42" fill="#5F9EA0" opacity="0.3" filter="url(#es-glow)"/>
  <ellipse cx="200" cy="220" rx="38" ry="42" fill="none" stroke="#5F9EA0" stroke-width="1" opacity="0.35"/>

  <!-- Wing overlay -->
  <path d="M180,208 C175,225 180,245 195,250 C210,255 230,245 232,230 C234,215 220,205 210,208 C200,211 190,208 185,210 Z" fill="#8B7EC8" opacity="0.15"/>
  <path d="M180,208 C175,225 180,245 195,250 C210,255 230,245 232,230 C234,215 220,205 210,208 C200,211 190,208 185,210" fill="none" stroke="#8B7EC8" stroke-width="0.8" opacity="0.25"/>
  <!-- Wing feather lines -->
  <path d="M188,218 C195,228 205,235 215,235" fill="none" stroke="#8B7EC8" stroke-width="0.5" opacity="0.15"/>
  <path d="M185,225 C192,232 200,238 210,240" fill="none" stroke="#8B7EC8" stroke-width="0.5" opacity="0.12"/>

  <!-- Head -->
  <circle cx="215" cy="195" r="20" fill="#5F9EA0" opacity="0.35"/>
  <circle cx="215" cy="195" r="20" fill="none" stroke="#5F9EA0" stroke-width="1" opacity="0.3"/>

  <!-- Closed eye (sleeping!) — curved line -->
  <path d="M222,192 C224,190 228,190 230,192" fill="none" stroke="#2D3142" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>

  <!-- Tiny smile line -->
  <path d="M228,198 C230,200 232,200 234,198" fill="none" stroke="#2D3142" stroke-width="0.8" opacity="0.25" stroke-linecap="round"/>

  <!-- Beak -->
  <path d="M234,196 L244,194 L236,200 Z" fill="#C2956B" opacity="0.5"/>

  <!-- Cheek blush -->
  <circle cx="226" cy="200" r="4" fill="#D16D6D" opacity="0.08"/>

  <!-- Head crest feathers -->
  <path d="M210,178 C208,168 212,160 216,165 C220,170 215,176 212,178" fill="#5F9EA0" opacity="0.25"/>
  <path d="M218,176 C218,166 224,160 226,166 C228,172 222,176 220,177" fill="#8B7EC8" opacity="0.2"/>

  <!-- Speech bubble with question mark -->
  <g transform="translate(252, 150)">
    <ellipse cx="0" cy="0" rx="22" ry="18" fill="none" stroke="#8B7EC8" stroke-width="1" opacity="0.35"/>
    <ellipse cx="0" cy="0" rx="22" ry="18" fill="#8B7EC8" opacity="0.05"/>
    <!-- Bubble tail -->
    <path d="M-8,16 L-4,24 L2,16" fill="none" stroke="#8B7EC8" stroke-width="1" opacity="0.35"/>
    <!-- Question mark -->
    <text x="0" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#8B7EC8" opacity="0.4">?</text>
  </g>

  <!-- Zzz sleeping indicators -->
  <text x="250" y="178" font-family="Georgia, serif" font-size="10" fill="#5F9EA0" opacity="0.2" transform="rotate(-10 250 178)">z</text>
  <text x="260" y="168" font-family="Georgia, serif" font-size="12" fill="#5F9EA0" opacity="0.15" transform="rotate(-5 260 168)">z</text>
  <text x="272" y="156" font-family="Georgia, serif" font-size="14" fill="#5F9EA0" opacity="0.1">z</text>

  <!-- Particles around the scene -->
  <circle cx="100" cy="180" r="1.5" fill="#5F9EA0" opacity="0.12"/>
  <circle cx="320" cy="190" r="1" fill="#8B7EC8" opacity="0.1"/>
  <circle cx="150" cy="150" r="1.2" fill="#C2956B" opacity="0.08"/>
  <circle cx="280" cy="300" r="1.5" fill="#5F9EA0" opacity="0.08"/>
  <circle cx="350" cy="230" r="1" fill="#8B7EC8" opacity="0.06"/>
</svg>
