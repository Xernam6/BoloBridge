<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <radialGradient id="ph-bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#F5F1EB"/>
    </radialGradient>
    <linearGradient id="ph-wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5F9EA0" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#8B7EC8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C2956B" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="ph-glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ph-soft"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>

  <rect width="600" height="400" fill="url(#ph-bg)"/>

  <!-- Background foliage shapes — soft organic leaves -->
  <path d="M30,300 C50,260 80,250 90,280 C100,310 70,320 50,310 Z" fill="#5F9EA0" opacity="0.06" filter="url(#ph-soft)"/>
  <path d="M60,340 C80,310 110,300 115,325 C120,350 85,360 70,350 Z" fill="#5F9EA0" opacity="0.04" filter="url(#ph-soft)"/>
  <path d="M520,280 C540,250 560,250 565,275 C570,300 545,310 530,300 Z" fill="#C2956B" opacity="0.06" filter="url(#ph-soft)"/>
  <path d="M550,320 C560,290 580,285 585,305 C590,325 565,335 555,330 Z" fill="#C2956B" opacity="0.04" filter="url(#ph-soft)"/>

  <!-- Sound wave bridge — multiple flowing lines connecting left and right -->
  <path d="M130,180 C200,140 260,220 300,200 C340,180 400,260 470,180" fill="none" stroke="url(#ph-wave1)" stroke-width="3" stroke-linecap="round" filter="url(#ph-glow)"/>
  <path d="M140,200 C210,165 265,235 305,215 C345,195 405,275 465,200" fill="none" stroke="url(#ph-wave1)" stroke-width="2" opacity="0.6" stroke-linecap="round" filter="url(#ph-soft)"/>
  <path d="M150,220 C215,190 270,250 310,230 C350,210 410,280 460,220" fill="none" stroke="url(#ph-wave1)" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
  <path d="M155,195 C220,175 270,225 310,210 C350,195 410,260 455,195" fill="none" stroke="#8B7EC8" stroke-width="0.8" opacity="0.2" stroke-linecap="round"/>
  <path d="M160,210 C225,200 270,220 310,215 C350,210 405,230 450,210" fill="none" stroke="#8B7EC8" stroke-width="0.5" opacity="0.12" stroke-linecap="round"/>

  <!-- Left hand (professional) — simplified elegant gesture -->
  <g opacity="0.55">
    <!-- Wrist / sleeve -->
    <path d="M60,240 L100,220 L110,200 L120,210 L130,190 L140,200 L135,220 L120,230 L90,260 Z" fill="#5F9EA0" opacity="0.3"/>
    <path d="M60,240 L100,220 L110,200 L120,210 L130,190 L140,200 L135,220 L120,230 L90,260" fill="none" stroke="#2D3142" stroke-width="1" opacity="0.3"/>
    <!-- Badge -->
    <rect x="60" y="250" width="24" height="16" rx="2" fill="#5F9EA0" opacity="0.25"/>
    <line x1="66" y1="256" x2="78" y2="256" stroke="#FAF8F5" stroke-width="0.8" opacity="0.4"/>
    <line x1="66" y1="260" x2="74" y2="260" stroke="#FAF8F5" stroke-width="0.6" opacity="0.3"/>
  </g>

  <!-- Right hand (child) — smaller, reaching -->
  <g opacity="0.55">
    <path d="M500,250 L470,230 L465,215 L455,222 L450,208 L440,215 L445,230 L455,238 L480,255 Z" fill="#C2956B" opacity="0.3"/>
    <path d="M500,250 L470,230 L465,215 L455,222 L450,208 L440,215 L445,230 L455,238 L480,255" fill="none" stroke="#2D3142" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Musical notes floating along the bridge -->
  <g fill="#2D3142" opacity="0.12">
    <circle cx="220" cy="170" r="4"/>
    <line x1="224" y1="170" x2="224" y2="150" stroke="#2D3142" stroke-width="1"/>
    <path d="M224,150 C228,148 232,150 232,154" fill="none" stroke="#2D3142" stroke-width="0.8"/>
  </g>
  <g fill="#2D3142" opacity="0.1">
    <circle cx="340" cy="190" r="3.5"/>
    <line x1="343.5" y1="190" x2="343.5" y2="172" stroke="#2D3142" stroke-width="0.8"/>
    <path d="M343.5,172 C347,170 350,172 350,175" fill="none" stroke="#2D3142" stroke-width="0.7"/>
  </g>
  <g fill="#2D3142" opacity="0.08">
    <circle cx="400" cy="240" r="3"/>
    <line x1="403" y1="240" x2="403" y2="225" stroke="#2D3142" stroke-width="0.7"/>
  </g>

  <!-- Particles -->
  <circle cx="180" cy="140" r="1.5" fill="#5F9EA0" opacity="0.2"/>
  <circle cx="300" cy="140" r="1" fill="#8B7EC8" opacity="0.15"/>
  <circle cx="420" cy="155" r="1.8" fill="#C2956B" opacity="0.15"/>
  <circle cx="250" cy="260" r="1" fill="#5F9EA0" opacity="0.1"/>
  <circle cx="350" cy="255" r="1.2" fill="#8B7EC8" opacity="0.08"/>
</svg>
