<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="mv-bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#2D3142"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </radialGradient>
    <radialGradient id="mv-center" cx="50%" cy="50%" r="15%">
      <stop offset="0%" stop-color="#5F9EA0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5F9EA0" stop-opacity="0"/>
    </radialGradient>
    <filter id="mv-blur1"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="mv-blur2"><feGaussianBlur stdDeviation="1"/></filter>
    <filter id="mv-glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#mv-bg)"/>
  <rect width="1920" height="1080" fill="url(#mv-center)"/>

  <g transform="translate(960, 540)">
    <!-- Layer 1: Outer rings (fading out) -->
    <circle cx="0" cy="0" r="480" fill="none" stroke="#5F9EA0" stroke-width="0.3" opacity="0.04"/>
    <circle cx="0" cy="0" r="440" fill="none" stroke="#8B7EC8" stroke-width="0.4" opacity="0.05"/>
    <circle cx="0" cy="0" r="400" fill="none" stroke="#5F9EA0" stroke-width="0.5" opacity="0.06"/>
    <circle cx="0" cy="0" r="360" fill="none" stroke="#8B7EC8" stroke-width="0.5" opacity="0.07"/>
    <circle cx="0" cy="0" r="320" fill="none" stroke="#5F9EA0" stroke-width="0.6" opacity="0.08"/>

    <!-- Layer 2: Organic warped rings (closer in) — not perfect circles, giving acoustic feel -->
    <ellipse cx="5" cy="-3" rx="280" ry="275" fill="none" stroke="#8B7EC8" stroke-width="0.8" opacity="0.1" filter="url(#mv-blur2)"/>
    <ellipse cx="-3" cy="5" rx="240" ry="245" fill="none" stroke="#5F9EA0" stroke-width="0.9" opacity="0.12" filter="url(#mv-blur2)"/>
    <ellipse cx="4" cy="2" rx="200" ry="196" fill="none" stroke="#8B7EC8" stroke-width="1" opacity="0.14"/>
    <ellipse cx="-2" cy="-4" rx="165" ry="160" fill="none" stroke="#5F9EA0" stroke-width="1.1" opacity="0.16"/>
    <ellipse cx="3" cy="3" rx="130" ry="126" fill="none" stroke="#8B7EC8" stroke-width="1.2" opacity="0.18" filter="url(#mv-blur1)"/>
    <ellipse cx="-1" cy="-2" rx="100" ry="96" fill="none" stroke="#5F9EA0" stroke-width="1.3" opacity="0.22"/>
    <ellipse cx="2" cy="1" rx="70" ry="66" fill="none" stroke="#8B7EC8" stroke-width="1.4" opacity="0.25"/>

    <!-- Layer 3: Inner glowing rings -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#5F9EA0" stroke-width="1.5" opacity="0.3" filter="url(#mv-glow)"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#C2956B" stroke-width="1.5" opacity="0.25" filter="url(#mv-glow)"/>

    <!-- Center pulsing microphone indicator -->
    <circle cx="0" cy="0" r="16" fill="#5F9EA0" opacity="0.15" filter="url(#mv-glow)"/>
    <circle cx="0" cy="0" r="10" fill="#5F9EA0" opacity="0.25"/>
    <circle cx="0" cy="0" r="5" fill="#FAF8F5" opacity="0.5"/>
    <circle cx="0" cy="0" r="2" fill="#FAF8F5" opacity="0.8"/>

    <!-- Radial tick marks — like a VU meter or audio visualizer -->
    <g opacity="0.12" stroke="#5F9EA0" stroke-width="0.8">
      <line x1="0" y1="-52" x2="0" y2="-60"/>
      <line x1="26" y1="-45" x2="30" y2="-52" transform="rotate(30)"/>
      <line x1="26" y1="-45" x2="30" y2="-52" transform="rotate(60)"/>
      <line x1="0" y1="-52" x2="0" y2="-60" transform="rotate(90)"/>
      <line x1="0" y1="-52" x2="0" y2="-60" transform="rotate(120)"/>
      <line x1="0" y1="-52" x2="0" y2="-60" transform="rotate(150)"/>
      <line x1="0" y1="-52" x2="0" y2="-60" transform="rotate(180)"/>
      <line x1="0" y1="-52" x2="0" y2="-60" transform="rotate(210)"/>
      <line x1="0" y1="-52" x2="0" y2="-60" transform="rotate(240)"/>
      <line x1="0" y1="-52" x2="0" y2="-60" transform="rotate(270)"/>
      <line x1="0" y1="-52" x2="0" y2="-60" transform="rotate(300)"/>
      <line x1="0" y1="-52" x2="0" y2="-60" transform="rotate(330)"/>
    </g>

    <!-- Audio level bars (like an EQ display, arranged in a circle) -->
    <g opacity="0.08">
      <rect x="-2" y="-95" width="4" height="18" rx="2" fill="#5F9EA0"/>
      <rect x="-2" y="-95" width="4" height="24" rx="2" fill="#5F9EA0" transform="rotate(30)"/>
      <rect x="-2" y="-95" width="4" height="14" rx="2" fill="#8B7EC8" transform="rotate(60)"/>
      <rect x="-2" y="-95" width="4" height="28" rx="2" fill="#5F9EA0" transform="rotate(90)"/>
      <rect x="-2" y="-95" width="4" height="10" rx="2" fill="#8B7EC8" transform="rotate(120)"/>
      <rect x="-2" y="-95" width="4" height="20" rx="2" fill="#5F9EA0" transform="rotate(150)"/>
      <rect x="-2" y="-95" width="4" height="16" rx="2" fill="#C2956B" transform="rotate(180)"/>
      <rect x="-2" y="-95" width="4" height="22" rx="2" fill="#5F9EA0" transform="rotate(210)"/>
      <rect x="-2" y="-95" width="4" height="12" rx="2" fill="#8B7EC8" transform="rotate(240)"/>
      <rect x="-2" y="-95" width="4" height="26" rx="2" fill="#5F9EA0" transform="rotate(270)"/>
      <rect x="-2" y="-95" width="4" height="15" rx="2" fill="#C2956B" transform="rotate(300)"/>
      <rect x="-2" y="-95" width="4" height="20" rx="2" fill="#8B7EC8" transform="rotate(330)"/>
    </g>
  </g>

  <!-- Floating ambient particles -->
  <circle cx="200" cy="200" r="1.5" fill="#5F9EA0" opacity="0.18"/>
  <circle cx="400" cy="150" r="1" fill="#8B7EC8" opacity="0.12"/>
  <circle cx="1500" cy="250" r="1.8" fill="#5F9EA0" opacity="0.15"/>
  <circle cx="1700" cy="800" r="1.2" fill="#8B7EC8" opacity="0.1"/>
  <circle cx="300" cy="800" r="1.5" fill="#C2956B" opacity="0.1"/>
  <circle cx="600" cy="900" r="1" fill="#5F9EA0" opacity="0.08"/>
  <circle cx="1300" cy="150" r="1.2" fill="#C2956B" opacity="0.08"/>
  <circle cx="100" cy="500" r="1" fill="#8B7EC8" opacity="0.06"/>
  <circle cx="1800" cy="500" r="1.5" fill="#5F9EA0" opacity="0.06"/>
</svg>
